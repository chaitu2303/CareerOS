<!DOCTYPE html>
<html>
<head><title>Mock Greenhouse Job Application</title></head>
<body>
  <div id="content" class="job-description">
    We are looking for a Senior React Developer. You need 5 years of experience with React, Next.js, and TypeScript.
    Knowledge of C++ is a plus.
  </div>
  
  <form id="application_form">
    <label for="first_name">First Name *</label>
    <input type="text" id="first_name" name="firstName" />
    
    <label for="last_name">Last Name *</label>
    <input type="text" id="last_name" name="lastName" />
    
    <label for="email">Email *</label>
    <input type="email" id="email" name="email" />
    
    <label for="phone">Phone</label>
    <input type="tel" id="phone" name="phone" />
    
    <label for="linkedin">LinkedIn URL</label>
    <input type="text" id="linkedin" name="linkedin" />
    
    <label for="ssn">Social Security Number (Sensitive)</label>
    <input type="text" id="ssn" name="ssn" />
    
    <label for="race">Race / Ethnicity</label>
    <select id="race" name="applicant_race">
      <option value="">Select...</option>
      <option value="asian">Asian</option>
    </select>
    
    <button type="submit" id="submit_app">Submit Application</button>
  </form>
</body>
</html>
